apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-sql
  namespace: ${NS_PGVECTOR}
data:
  init.sql: |
    -- Enable vector extension on the default database
    CREATE EXTENSION IF NOT EXISTS vector;

    -- userinfo database (MCP server user data)
    SELECT 'CREATE DATABASE userinfo'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'userinfo')\gexec

    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${PG_USERINFO_USER}') THEN
        CREATE ROLE ${PG_USERINFO_USER} WITH LOGIN PASSWORD '${PG_USERINFO_PASSWORD}';
      END IF;
    END $$;
    GRANT ALL PRIVILEGES ON DATABASE userinfo TO ${PG_USERINFO_USER};
    ALTER DATABASE userinfo OWNER TO ${PG_USERINFO_USER};

    -- llamastack database (Llama Stack internal state)
    SELECT 'CREATE DATABASE llamastack'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'llamastack')\gexec

    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${PG_LLAMASTACK_USER}') THEN
        CREATE ROLE ${PG_LLAMASTACK_USER} WITH LOGIN PASSWORD '${PG_LLAMASTACK_PASSWORD}';
      END IF;
    END $$;
    GRANT ALL PRIVILEGES ON DATABASE llamastack TO ${PG_LLAMASTACK_USER};
    ALTER DATABASE llamastack OWNER TO ${PG_LLAMASTACK_USER};

  userinfo_seed.sql: |
    -- Schema + sample data for userinfo (userinfo-api + router chat_sessions)
    BEGIN;

    CREATE TABLE IF NOT EXISTS users (
        user_id SERIAL PRIMARY KEY,
        external_id VARCHAR(50),
        username VARCHAR(50) NOT NULL,
        user_name VARCHAR(100) NOT NULL,
        email VARCHAR(100) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_username ON users(username);
    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_users_external_id ON users(external_id);

    CREATE TABLE IF NOT EXISTS plans (
        plan_id SERIAL PRIMARY KEY,
        plan_name VARCHAR(100) NOT NULL UNIQUE,
        data_limit_gb INTEGER NOT NULL,
        voice_limit_minutes INTEGER NOT NULL,
        sms_limit INTEGER NOT NULL,
        price NUMERIC(10,2) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS subscriptions (
        subscription_id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL REFERENCES users(user_id),
        mobile_number VARCHAR(20) NOT NULL UNIQUE,
        account_number VARCHAR(50) NOT NULL,
        status VARCHAR(20) DEFAULT 'active',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS user_plans (
        id SERIAL PRIMARY KEY,
        subscription_id INTEGER NOT NULL REFERENCES subscriptions(subscription_id),
        plan_id INTEGER NOT NULL REFERENCES plans(plan_id),
        start_date DATE NOT NULL,
        end_date DATE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS usage_records (
        usage_id SERIAL PRIMARY KEY,
        subscription_id INTEGER NOT NULL REFERENCES subscriptions(subscription_id),
        usage_date DATE NOT NULL,
        data_used_gb NUMERIC(5,2) NOT NULL,
        voice_used_minutes INTEGER NOT NULL,
        sms_used INTEGER NOT NULL,
        UNIQUE (subscription_id, usage_date)
    );

    CREATE TABLE IF NOT EXISTS billing (
        bill_id SERIAL PRIMARY KEY,
        subscription_id INTEGER NOT NULL REFERENCES subscriptions(subscription_id),
        billing_cycle_start DATE NOT NULL,
        billing_cycle_end DATE NOT NULL,
        total_amount NUMERIC(10,2) NOT NULL,
        paid BOOLEAN DEFAULT FALSE,
        payment_date DATE
    );

    CREATE TABLE IF NOT EXISTS usage_insights (
        id SERIAL PRIMARY KEY,
        subscription_id INTEGER NOT NULL REFERENCES subscriptions(subscription_id),
        month DATE NOT NULL,
        usage_type VARCHAR(20) NOT NULL,
        data_usage_percent NUMERIC(5,2) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS chat_sessions (
        username TEXT PRIMARY KEY,
        history JSONB NOT NULL
    );

    TRUNCATE TABLE
        usage_insights,
        billing,
        usage_records,
        user_plans,
        subscriptions,
        users,
        plans,
        chat_sessions
    RESTART IDENTITY CASCADE;

    INSERT INTO plans (plan_name, data_limit_gb, voice_limit_minutes, sms_limit, price) VALUES
        ('Lite 2GB', 2, 100, 50, 9.99),
        ('Budget Saver 5GB', 5, 200, 100, 15.00),
        ('Starter 10GB', 10, 300, 200, 22.00),
        ('Standard 20GB', 20, 500, 300, 30.00),
        ('Standard Plus 30GB', 30, 600, 350, 38.00),
        ('Premium 50GB', 50, 1000, 500, 50.00),
        ('Gaming 60GB', 60, 1200, 600, 58.00),
        ('Business 100GB', 100, 2000, 1000, 99.00),
        ('Family Unlimited', 999, 5000, 3000, 120.00),
        ('Ultimate Unlimited', 999, 9999, 9999, 149.00);

    INSERT INTO users (external_id, username, user_name, email) VALUES
        ('ext_01', 'jessica.thompson', 'Jessica Thompson', 'jessica.thompson@example.com'),
        ('ext_02', 'marcus.rivera', 'Marcus Rivera', 'marcus.rivera@example.com'),
