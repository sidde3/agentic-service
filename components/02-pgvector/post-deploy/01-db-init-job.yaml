    COMMIT;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: ${NS_PGVECTOR}
  labels:
    app: pgvector-setup
    phase: db-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: pgvector-setup
        phase: db-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pg
          image: pgvector/pgvector:pg15
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for pgvector to accept connections..."
              until pg_isready -h pgvector.${NS_PGVECTOR}.svc.cluster.local -U ${PGVECTOR_USER} -d ${PGVECTOR_DB}; do
                sleep 3
              done
              echo "pgvector is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-secret
                  key: POSTGRES_PASSWORD
      containers:
        - name: init
          image: pgvector/pgvector:pg15
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Running database initialization (admin)..."
              export PGPASSWORD="${PGVECTOR_PASSWORD}"
              psql -h "pgvector.${NS_PGVECTOR}.svc.cluster.local" \
                   -U "${PGVECTOR_USER}" \
                   -d "${PGVECTOR_DB}" \
                   -v ON_ERROR_STOP=1 \
                   -f /scripts/init.sql
              echo ""
              echo "Creating userinfo tables and sample data (userinfo role)..."
              export PGPASSWORD="${PG_USERINFO_PASSWORD}"
              psql -h "pgvector.${NS_PGVECTOR}.svc.cluster.local" \
                   -U "${PG_USERINFO_USER}" \
                   -d userinfo \
                   -v ON_ERROR_STOP=1 \
                   -f /scripts/userinfo_seed.sql
              echo ""
              echo "Verifying databases..."
              export PGPASSWORD="${PGVECTOR_PASSWORD}"
              psql -h "pgvector.${NS_PGVECTOR}.svc.cluster.local" \
                   -U "${PGVECTOR_USER}" \
                   -d "${PGVECTOR_DB}" \
                   -tAc "SELECT datname FROM pg_database WHERE datname IN ('userinfo','llamastack','${PGVECTOR_DB}') ORDER BY datname;"
              echo ""
              echo "Verifying roles..."
              psql -h "pgvector.${NS_PGVECTOR}.svc.cluster.local" \
                   -U "${PGVECTOR_USER}" \
                   -d "${PGVECTOR_DB}" \
                   -tAc "SELECT rolname FROM pg_roles WHERE rolname IN ('${PG_USERINFO_USER}','${PG_LLAMASTACK_USER}') ORDER BY rolname;"
              echo ""
              echo "Database initialization complete."
          env:
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-secret
                  key: POSTGRES_PASSWORD
            - name: PGVECTOR_USER
              value: "${PGVECTOR_USER}"
            - name: PGVECTOR_DB
              value: "${PGVECTOR_DB}"
            - name: PG_USERINFO_USER
              value: "${PG_USERINFO_USER}"
            - name: PG_USERINFO_PASSWORD
              value: "${PG_USERINFO_PASSWORD}"
            - name: PG_LLAMASTACK_USER
              value: "${PG_LLAMASTACK_USER}"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: db-init-sql
