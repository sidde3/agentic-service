        ('ext_10', 'anna.kowalski', 'Anna Kowalski', 'anna.kowalski@example.com');

    INSERT INTO subscriptions (user_id, mobile_number, account_number, status) VALUES
        (1, '0810000001', 'ACC-3001', 'active'),
