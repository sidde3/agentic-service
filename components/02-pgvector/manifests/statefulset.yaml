apiVersion: v1
kind: Secret
metadata:
  name: pgvector-secret
  namespace: ${NS_PGVECTOR}
type: Opaque
stringData:
  POSTGRES_DB: ${PGVECTOR_DB}
  POSTGRES_USER: ${PGVECTOR_USER}
  POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: ${NS_PGVECTOR}
  labels:
    app: pgvector
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: pgvector
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: ${NS_PGVECTOR}
spec:
  serviceName: pgvector
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: pgvector-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgvector-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "${PGVECTOR_USER}"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "${PGVECTOR_USER}"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: pgvector-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
