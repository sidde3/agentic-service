# ServingRuntime: finetuned-phayathai-bert (CPU — vLLM CPU)
# Source: intent-classification-sidd namespace
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    openshift.io/display-name: vLLM CPU Runtime
  name: finetuned-phayathai-bert
  namespace: ${NS_MODELS}
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
  - args:
    - --port=8080
    - --model=/mnt/models
    - --served-model-name={{.Name}}
    command:
    - python
    - -m
    - vllm.entrypoints.openai.api_server
    env:
    - name: HF_HOME
      value: /tmp/hf_home
    image: registry.redhat.io/rhaii-early-access/vllm-cpu-rhel9:3.4.0-ea.2-1774640877
    name: kserve-container
    ports:
    - containerPort: 8080
      protocol: TCP
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
  multiModel: false
  supportedModelFormats:
  - autoSelect: true
    name: vLLM
