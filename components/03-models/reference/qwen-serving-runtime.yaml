apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-qwen-runtime
  namespace: ${NS_MODELS}
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/template-display-name: vLLM NVIDIA GPU Runtime (Qwen)
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: quay.io/modh/vllm@sha256:5d08cf5da0c7e5cdfbcbecb2f68db9e82bfe38d1073251e2af6a13fae72638b0
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name=qwen25-7b-instruct
        - --dtype=auto
        - --max-model-len=8192
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
        - --chat-template=/opt/app-root/template/tool_chat_template_qwen.jinja
        - --trust-remote-code
      env:
        - name: HF_HUB_CACHE
          value: /tmp
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        limits:
          cpu: "4"
          memory: 24Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 12Gi
          nvidia.com/gpu: "1"
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 15
      tolerations:
        - key: nvidia.com/gpu
          value: l40-gpu
          effect: NoSchedule
