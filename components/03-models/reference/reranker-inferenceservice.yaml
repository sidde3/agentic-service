# InferenceService: Qwen3-Reranker-0.6B (reranker for RAG results)
# Source: intent-classification-sidd namespace
# Model: hf://Qwen/Qwen3-Reranker-0.6B
# Key args: --runner=pooling --task=score (runs as a scoring/reranking model, not generative)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    opendatahub.io/connections: qwen3-reranker-06b
    opendatahub.io/hardware-profile-name: nvidia-gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/display-name: Qwen3-Reranker-0.6B
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: "true"
  name: qwen3-reranker-06b
  namespace: ${NS_MODELS}
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: Recreate
    maxReplicas: 1
    minReplicas: 1
    model:
      args:
      - --max-model-len 8192
      - --trust-remote-code
      - --runner=pooling
      - --task=score
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 4Gi
          nvidia.com/gpu: "1"
      runtime: qwen3-reranker-06b
      storageUri: hf://Qwen/Qwen3-Reranker-0.6B
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Equal
      value: l40-gpu
